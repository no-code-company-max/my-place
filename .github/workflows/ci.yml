name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy para el job `quality` — no toca DB real. Deben estar presentes para
  # que `next build` pase validación de serverEnv (zod) durante SSG.
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
  SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
  DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_APP_DOMAIN: localhost:3000

jobs:
  quality:
    name: typecheck · lint · format · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build

  e2e:
    name: e2e · rls (branch Supabase efímera)
    runs-on: ubuntu-latest
    # Concurrency independiente del job quality → CI quality corre simultáneo
    # pero branches se serializan por ref para evitar acumulación por runs
    # consecutivos.
    concurrency:
      group: e2e-branch-${{ github.ref }}
      cancel-in-progress: true
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
      NEXT_PUBLIC_APP_URL: http://lvh.me:3001
      NEXT_PUBLIC_APP_DOMAIN: lvh.me:3001
      PLAYWRIGHT_BASE_URL: http://lvh.me:3001
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      # Skip gracioso si los secrets no están seteados en el repo. Permite
      # al repo correr sin Supabase Management API token (forks, repos
      # personales sin presupuesto para branches efímeras). Si querés
      # habilitar el e2e completo, configurá los 3 secrets en
      # Settings → Secrets and variables → Actions.
      - name: Check required secrets
        id: secrets
        run: |
          missing=()
          for var in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF E2E_TEST_SECRET; do
            if [[ -z "${!var:-}" ]]; then
              missing+=("$var")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::warning::Skipping e2e — falta(n) secret(s) en GitHub Actions: ${missing[*]}. Configurar en Settings → Secrets para habilitar."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Crear branch Supabase efímera
        if: steps.secrets.outputs.skip != 'true'
        id: create_branch
        run: |
          branch_name="ci-${{ github.run_id }}-${{ github.job }}-$(date +%s)"
          branch_id=$(bash scripts/ci/branch-helpers.sh create_branch "$branch_name")
          echo "branch_id=$branch_id" >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

      - name: Esperar branch ACTIVE
        if: steps.secrets.outputs.skip != 'true'
        run: bash scripts/ci/branch-helpers.sh poll_until_active "${{ steps.create_branch.outputs.branch_id }}"

      - name: Resolver env de la branch
        if: steps.secrets.outputs.skip != 'true'
        run: |
          bash scripts/ci/branch-helpers.sh fetch_branch_env \
            "${{ steps.create_branch.outputs.branch_id }}" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        if: steps.secrets.outputs.skip != 'true'
      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.skip != 'true'
        with:
          node-version: 22
          cache: pnpm

      - if: steps.secrets.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.secrets.outputs.skip != 'true'
        run: pnpm prisma generate

      - name: Aplicar migraciones sobre la branch
        if: steps.secrets.outputs.skip != 'true'
        run: pnpm prisma migrate deploy

      - name: Sembrar fixtures E2E
        if: steps.secrets.outputs.skip != 'true'
        run: pnpm tsx tests/fixtures/e2e-seed.ts

      - name: RLS tests directos (vitest + pg + SET LOCAL)
        if: steps.secrets.outputs.skip != 'true'
        run: pnpm vitest run --config vitest.rls.config.ts

      - if: steps.secrets.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E Playwright (globalSetup + smoke + flows)
        if: steps.secrets.outputs.skip != 'true'
        run: pnpm exec playwright test

      - name: Cleanup — borrar branch Supabase
        if: always() && steps.create_branch.outputs.branch_id != ''
        run: bash scripts/ci/branch-helpers.sh delete_branch "${{ steps.create_branch.outputs.branch_id }}"

      - name: Upload Playwright report
        if: failure() && steps.secrets.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
